version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: uber_kafka_redis
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    restart: always

  # Using Redpanda as a lightweight Kafka alternative (100% Kafka API compatible, no Zookeeper needed)
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v23.2.28
    container_name: uber_kafka_broker
    command:
      - redpanda
      - start
      - --smp 1
      - --memory 1G
      - --reserve-memory 0M
      - --overprovisioned
      - --node-id 0
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
    ports:
      - "19092:19092"
      - "18082:18082"
      - "9644:9644"
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    restart: always

volumes:
  redis_data:
  redpanda_data:
